services:
  ad-server:
    build:
      context: .
      dockerfile: deployment/docker/Dockerfile
    environment:
      - LITEADS_ENV=prod
      - LITEADS_DATABASE__HOST=postgres
      - LITEADS_DATABASE__PORT=5432
      - LITEADS_DATABASE__NAME=liteads
      - LITEADS_DATABASE__USER=liteads
      - LITEADS_DATABASE__PASSWORD=liteads_password
      - LITEADS_REDIS__HOST=redis
      - LITEADS_REDIS__PORT=6379
      - REDIS_URL=redis://redis:6379/0  # <--- AÑADE ESTA LÍNEA
      - LITEADS_REDIS_URL=redis://redis:6379/0 # <--- AÑADE ESTA TAMBIÉN POR SI ACASO
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    networks:
      - dokploy-network
    # SE ELIMINARON LOS LABELS DE TRAEFIK. EL ENRUTAMIENTO SE HARÁ POR LA INTERFAZ.

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: liteads
      POSTGRES_PASSWORD: liteads_password
      POSTGRES_DB: liteads
    volumes:
      - postgres_data_v6:/var/lib/postgresql/data  # <--- AÑADE EL "_v2" AQUÍ
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U liteads -d liteads"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - dokploy-network

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - dokploy-network

# Declaración obligatoria de volúmenes y red externa de Dokploy
volumes:
  postgres_data_v6:
  redis_data:

networks:
  dokploy-network:
    external: true
