services:
  ad-server:
    build:
      context: .
      dockerfile: deployment/docker/Dockerfile
    env_file:
      - .env  # Importante para el Paso 4 (Dokploy inyectará los secretos)
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    networks:
      - dokploy-network
    labels:
      - "traefik.enable=true"
      # Enrutamiento: Solo atiende a este dominio Y a rutas que empiecen con /anunciosNES
      - "traefik.http.routers.nes-adserver.rule=Host(`desarrollo.nettalco.com.pe`) && PathPrefix(`/anunciosNES`)"
      - "traefik.http.routers.nes-adserver.entrypoints=websecure"
      - "traefik.http.routers.nes-adserver.tls.certResolver=letsencrypt"
      - "traefik.http.services.nes-adserver.loadbalancer.server.port=8000"
      # StripPrefix: Elimina "/anunciosNES" de la URL antes de entregarla a la app de Python (evita errores 404)
      - "traefik.http.middlewares.nes-adserver-strip.stripprefix.prefixes=/anunciosNES"
      - "traefik.http.routers.nes-adserver.middlewares=nes-adserver-strip"

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: liteads
      POSTGRES_PASSWORD: liteads_password
      POSTGRES_DB: liteads
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U liteads -d liteads"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - dokploy-network

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - dokploy-network

# Declaración obligatoria de volúmenes y red externa de Dokploy
volumes:
  postgres_data:
  redis_data:

networks:
  dokploy-network:
    external: true
